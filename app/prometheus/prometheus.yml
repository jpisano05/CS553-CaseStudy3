global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'frontend'
    metrics_path: /metrics
    static_configs:
      - targets: ['group05frontend:22133']

  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['group05backend:22131']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']